name: CI

on:
  push:
    branches:
      - main
    paths:
      - 'skills/**'
      - 'bin/**'
      - 'scripts/**'
      - 'package.json'
      - '.github/workflows/ci.yml'
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    name: Validate skill
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Validate skill structure
        run: node bin/bmad-dev-loop.js validate

  unit-tests:
    name: CLI tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Run unit tests
        run: |
          if [ -d tests ]; then
            node --test tests/
          else
            echo "No tests/ directory yet — skipping."
          fi

  link-check:
    name: Markdown link check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Check internal markdown links
        run: |
          node -e "
          const { readdirSync, readFileSync, statSync, existsSync } = require('node:fs');
          const { join } = require('node:path');
          const ROOT = 'docs';
          const mdFiles = [];
          (function walk(d) {
            for (const f of readdirSync(d)) {
              const p = join(d, f);
              const s = statSync(p);
              if (s.isDirectory()) walk(p);
              else if (f.endsWith('.md')) mdFiles.push(p);
            }
          })(ROOT);
          const linkRe = /\\]\\((?!https?:|#|mailto:)([^)]+)\\)/g;
          const fileExists = (rel) => {
            const stripped = rel.split('#')[0].split(' ')[0];
            if (!stripped) return true;
            const candidates = [join(ROOT, stripped), join(ROOT, stripped + '.md'), join(ROOT, stripped, 'index.md')];
            return candidates.some((p) => existsSync(p));
          };
          let broken = 0;
          for (const f of mdFiles) {
            const text = readFileSync(f, 'utf8');
            for (const m of text.matchAll(linkRe)) {
              const link = m[1];
              if (!link.startsWith('/')) continue;
              if (!fileExists(link)) {
                console.error('BROKEN', f, '->', link);
                broken++;
              }
            }
          }
          if (broken > 0) process.exit(1);
          console.log('OK — ' + mdFiles.length + ' markdown files checked');
          "
